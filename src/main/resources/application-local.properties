spring.application.name=chat-client
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n

spring.ai.openai.chat.options.model=openai/gpt-oss-120b
# Do NOT store secrets in source control. Read the API key from an environment variable.
# At runtime (Docker / CI) provide OPENAI_API_KEY as an env var or use Docker secrets.
spring.ai.openai.api-key=${OPENAI_API_KEY:}
# If you need to override the base URL, set OPENAI_API_BASE_URL env var; otherwise keep the default here.
spring.ai.openai.chat.base-url=${OPENAI_API_BASE_URL:https://api.groq.com/openai/v1}

logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=debug

server.port=${PORT:8080}